<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta http-equiv="X-UA-Compatible" content="ie=edge" />
        <title>Dice Roller</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Archivo+Narrow:ital,wght@0,400..700;1,400..700&family=Roboto:ital,wght@0,100..900;1,100..900&family=Source+Sans+3:ital,wght@0,200..900;1,200..900&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="index.css" />
    </head>
    <body>
        <div class="dice-roller_card">
            <h1 class="dice-roller_header">Dice Roller</h1>
            <div class="inputs">
                <div class="input-group">
                    <label for="diceCount">No. of Dice</label>
                    <input
                        type="number"
                        id="diceCount"
                        name="diceCount"
                        min="1"
                        max="6"
                        value="1"
                        step="1"
                    />
                </div>
                <button id="rollDice" class="roll-dice">Roll Dice</button>
            </div>
            <div class="result-box">
                <div class="result-box_text">
                    <p id="results" class="results">Result:10,2,3</p>
                    <p id="results-sum" class="results-sum">Sum:15</p>
                </div>
                <div class="result-box_imgs">
                    <img src="dice_images/1.svg" />
                    <img src="dice_images/2.svg" />
                    <img src="dice_images/3.svg" />
                    <img src="dice_images/4.svg" />
                    <img src="dice_images/5.svg" />
                    <img src="dice_images/6.svg" />
                </div>
            </div>
        </div>
        <script src="index.js" type="text/javascript"></script>
    </body>
</html>
